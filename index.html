<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 할 일</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="manifest" href="manifest.json?v=6">
    <link rel="icon" href="icon.png?v=6">
</head>
<body>
    <div id="tutorial-overlay" class="hidden">
        <div id="tutorial-box">
            <div class="step-indicator" id="step-indicator">1 / 5</div>
            <h2 id="tutorial-title">제목</h2>
            <div id="tutorial-visual"></div>
            <p id="tutorial-text">내용</p>
            <div class="tutorial-buttons">
                <button id="btn-tutorial-prev">이전</button>
                <button id="btn-tutorial-next">다음</button>
            </div>
        </div>
    </div>

    <div id="popup-overlay" class="hidden">
        <div id="popup-box">
            <!-- ✅ 수정: '오늘의 할 일' → '오늘 할 일' -->
            <h2 style="margin-top: 0; color: #d9534f;">오늘 할 일</h2>
            <p id="popup-task-text" style="font-size: 20px; font-weight: bold;">할 일 내용</p>
            <!-- ✅ 수정: 버튼 순서 및 문구 변경 -->
            <div class="popup-buttons">
                <button id="btn-next">다음 할 일</button>
                <button id="btn-later">나중에</button>
                <button id="btn-complete">완료</button>
            </div>
        </div>
    </div>

    <div class="tab-container">
        <button id="tab-routine" class="tab-btn active">일상</button>
        <button id="tab-work" class="tab-btn">업무</button>
    </div>

    <div class="input-container">
        <input type="text" id="task-input" placeholder="새로운 할 일을 입력하세요">
        <button id="add-btn">입력</button>
    </div>

    <div id="task-list"></div>

    <script src="app.js?v=6"></script>
</body>
</html>
